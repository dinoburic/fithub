<div class="settings-wrapper" style="padding: 40px; max-width: 600px; margin: auto; color: white;">
  <h2>Profile Settings</h2>
  <p style="color: #bcbcbc; margin-bottom: 25px;">Update your personal information and body metrics.</p>

  <div *ngIf="isSaved" style="background: #28a745; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
    Profile updated successfully!
  </div>

  <form [formGroup]="settingsForm" (ngSubmit)="onSubmit()">
    
    <div style="display: flex; gap: 15px; margin-bottom: 20px;">
      <div style="flex: 1;">
        <label style="display: block; margin-bottom: 8px;">First Name</label>
        <input type="text" formControlName="name" 
               style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: white;">
      </div>

      <div style="flex: 1;">
        <label style="display: block; margin-bottom: 8px;">Last Name</label>
        <input type="text" formControlName="surname" 
               style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: white;">
      </div>
    </div>

    <div style="display: flex; gap: 15px; margin-bottom: 20px;">
      <div style="flex: 1;">
        <label style="display: block; margin-bottom: 8px;">Phone Number</label>
        <input type="text" formControlName="phoneNumber" 
               style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: white;">
      </div>
      <div style="flex: 1;">
        <label style="display: block; margin-bottom: 8px;">Address</label>
        <input type="text" formControlName="address" 
               style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: white;">
      </div>
    </div>

    <div style="display: flex; gap: 15px; margin-bottom: 25px;">
      <div style="flex: 1;">
        <label style="display: block; margin-bottom: 8px;">Weight (kg)</label>
        <input type="number" formControlName="weight" 
               style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: white;">
      </div>
      <div style="flex: 1;">
        <label style="display: block; margin-bottom: 8px;">Height (cm)</label>
        <input type="number" formControlName="height" 
               style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #444; background: #1a1a1a; color: white;">
      </div>
    </div>

    <button type="submit" 
            style="background: #ff8235; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%;">
      Save Changes
    </button>
  </form>
</div>
