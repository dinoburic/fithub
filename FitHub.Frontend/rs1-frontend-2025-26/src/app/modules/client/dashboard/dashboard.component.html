<div class="dashboard-wrapper" style="padding: 40px; max-width: 1000px; margin: auto; color: white;">
  <h2>Welcome back, {{ userName }}!</h2>
  <p style="color: #bcbcbc; margin-bottom: 30px;">This is your personal overview of FitHub activities.</p>

  <div style="display: flex; gap: 20px; flex-wrap: wrap;">
    <div style="flex: 1; min-width: 250px; background: #1a1a1a; padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #333;">
      <h1 style="color: #ff8235; font-size: 3rem; margin: 0;">{{ totalOrders }}</h1>
      <p style="font-size: 1.1rem; color: #fff;">Purchased Plans</p>
    </div>

    <div style="flex: 1; min-width: 250px; background: #1a1a1a; padding: 30px; border-radius: 12px; text-align: center; border: 1px solid #333;">
      <h1 style="color: #ff8235; font-size: 3rem; margin: 0;">{{ cartItemsCount }}</h1>
      <p style="font-size: 1.1rem; color: #fff;">Items in Cart</p>
    </div>

    
  </div>
</div>
