<div class="checkout-container">
  
  <h1 class="page-title">Checkout</h1>

  <div class="checkout-layout">

    <div class="form-section">
      <form [formGroup]="checkoutForm" (ngSubmit)="onSubmit()">
        
        <h3>Billing Details</h3>

        <div class="form-row">
          <div class="form-group half">
            <label>First Name</label>
            <input type="text" formControlName="firstName" placeholder="John">
            <div class="error" *ngIf="checkoutForm.get('firstName')?.touched && checkoutForm.get('firstName')?.invalid">
              Name is required.
            </div>
          </div>

          <div class="form-group half">
            <label>Last Name</label>
            <input type="text" formControlName="lastName" placeholder="Doe">
            <div class="error" *ngIf="checkoutForm.get('lastName')?.touched && checkoutForm.get('lastName')?.invalid">
              Last name is required.
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" formControlName="email" placeholder="john@example.com">
          <div class="error" *ngIf="checkoutForm.get('email')?.touched && checkoutForm.get('email')?.invalid">
            Valid email is required.
          </div>
        </div>

        <div class="form-group">
          <label>Address</label>
          <input type="text" formControlName="address" placeholder="Street Name, House Number">
          <div class="error" *ngIf="checkoutForm.get('address')?.touched && checkoutForm.get('address')?.invalid">
            Address is required.
          </div>
        </div>

        <div class="form-row">
          <div class="form-group third">
            <label>City</label>
            <input type="text" formControlName="city">
          </div>
          <div class="form-group third">
            <label>Zip Code</label>
            <input type="text" formControlName="zipCode">
          </div>
          <div class="form-group third">
            <label>Country</label>
            <input type="text" formControlName="country">
          </div>
        </div>

       
        </form>
    </div>

    <div class="summary-section">
      <div class="summary-card">
        <h3>Order Summary</h3>
        
        <div class="summary-row">
          <span>Subtotal</span>
          <span>{{ totalAmount | currency:'EUR' }}</span>
        </div>
        
        <div class="summary-row">
          <span>Shipping</span>
          <span>Free</span>
        </div>

        <hr>

        <div class="summary-row total">
          <span>Total</span>
          <span>{{ totalAmount | currency:'EUR' }}</span>
        </div>

        <button 
          class="place-order-btn" 
          (click)="onSubmit()" 
         [disabled]="isSubmitting || checkoutForm.invalid"
          [class.disabled]="checkoutForm.invalid || isSubmitting">
          
          <span *ngIf="!isSubmitting">Place Order</span>
          <span *ngIf="isSubmitting">Processing...</span>
        </button>

        <p class="secure-text">🔒 Secure Checkout</p>
      </div>
    </div>

  </div>
</div>
