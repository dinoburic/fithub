<div class="reviews-section">
  <h2>Reviews ({{ reviews.length }})</h2>

  <div class="add-review-box">
    <h3>Write a Review</h3>
    
    <div class="interactive-stars">
      <span class="star-label">Your rating:</span>
      <svg *ngFor="let star of stars" 
           xmlns="http://www.w3.org/2000/svg" 
           width="24" height="24" 
           viewBox="0 0 24 24" 
           stroke="currentColor" 
           stroke-width="2" 
           stroke-linecap="round" 
           stroke-linejoin="round"
           class="star-icon"
           [class.filled]="star <= (hoverRating || newRating)"
           (click)="setRating(star)"
           (mouseenter)="hoverRating = star"
           (mouseleave)="hoverRating = 0">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
      </svg>
    </div>

    <textarea 
      [(ngModel)]="newComment" 
      rows="3" 
      placeholder="Write your review..." 
      class="review-textarea">
    </textarea>

    <button class="btn-primary" (click)="submitReview()" [disabled]="isSubmitting || newRating === 0">
      {{ isSubmitting ? 'Submiting...' : 'Publish' }}
    </button>
  </div>

  <div class="review-list" *ngIf="reviews.length > 0; else noReviews">
    <div class="review-card" *ngFor="let review of reviews">
      <div class="review-avatar">
        <div class="avatar-circle">{{ review.userName.charAt(0) | uppercase }}</div>
        <span class="review-name">{{ review.userName }}</span>
      </div>
      <div class="review-content">
        <div class="review-stars">
          <svg *ngFor="let star of getArray(review.rating)" class="star-icon filled" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
        </div>
        <p class="review-text">{{ review.comment }}</p>
        <span class="review-date">{{ review.createdAtUTC | date:'mediumDate' }}</span>
      </div>
    </div>
  </div>

  <ng-template #noReviews>
    <p class="no-reviews-msg">This fitness plan has no reviews yet.</p>
  </ng-template>
</div>
