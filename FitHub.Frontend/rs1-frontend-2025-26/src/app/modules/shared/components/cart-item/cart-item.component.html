<div class="cart-card" [class.saved-mode]="isSaved">
  
  <div class="image-container">
    <img [src]="item.imageUrl || '/images/planphoto.jpg'" 
         [alt]="item.title"
         onerror="this.src='/images/planphoto.jpg'">
  </div>

  <div class="details">
    <h3 class="title">{{ item.title }}</h3>
    
    <div class="meta" *ngIf="!isSaved">
      <span *ngIf="item.durationInWeeks">{{ item.durationInWeeks }} weeks</span>
      <span class="dot" *ngIf="item.durationInWeeks && item.difficulty">•</span>
      <span *ngIf="item.difficulty">{{ item.difficulty }}</span>
    </div>

    <div class="price">
      {{ item.price | currency:'EUR':'symbol':'1.0-0' }}
    </div>
  </div>

  <div class="actions">
    
    <button *ngIf="!isSaved" class="action-btn save-btn" (click)="onSaveForLater()" title="Save for later">
       <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    </button>

    <button *ngIf="isSaved" class="action-btn move-btn" (click)="onMoveToCart()" title="Move back to cart">
       <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path><line x1="12" y1="9" x2="12" y2="15"></line><line x1="9" y1="12" x2="15" y2="12"></line></svg>
    </button>

    <button class="action-btn delete-btn" (click)="onRemove()" title="Remove item">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18"/>
        <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
        <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
      </svg>
    </button>
  </div>

</div>
