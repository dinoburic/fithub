<div class="login-form-wrapper">

  <!-- Title -->
  <h1 class="login-title">
    LOGIN
  </h1>

  <p class="login-subtitle">
    Don’t have an account?
    <a routerLink="/auth/register">Register</a>
  </p>

  <!-- Error -->
  <div *ngIf="errorMessage" class="error-message">
    <mat-icon>error_outline</mat-icon>
    <span>{{ errorMessage }}</span>
  </div>

  <!-- FORM -->
  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <!-- Email -->
    <label class="field-label">Email</label>
    <input
      type="email"
      class="auth-input"
      formControlName="email"
      placeholder=""
      autocomplete="email"
    />

    <!-- Password -->
    <label class="field-label">Password</label>
    <input
      type="password"
      class="auth-input"
      formControlName="password"
      autocomplete="current-password"
    />

    <!-- Fitness center -->
    <label class="field-label">Fitness center</label>
    <div class="select-wrapper">
      <select
        class="auth-input"
        formControlName="fitnessCenters"
      >
        <option value="" disabled selected>
          Odaberite fitness centar
        </option>

        <option
          *ngFor="let center of fitnessCenters"
          [value]="center.id"
        >
          {{ center.name }}
        </option>
      </select>
    </div>

    <!-- Social login -->
    <div class="social-login">
  <span>Or sign in with</span>
  
  <div class="social-icons" style="display: flex; gap: 15px; justify-content: center; align-items: center; margin-top: 10px;">
    
    <asl-google-signin-button 
      type="icon" 
      size="medium" 
      shape="circle">
    </asl-google-signin-button>

    <div class="social-icon facebook" (click)="signInWithFB()" style="cursor: pointer;">
      f
    </div>

  </div>
</div>

    <!-- Submit -->
    <button
      type="submit"
      class="login-button"
      [disabled]="form.invalid || isLoading"
    >
      Sign in
    </button>

  </form>
</div>
