<div class="strength-container" >
  <span *ngIf="password" class="label-text">Password strength:</span>

  <div *ngIf="password" class="bar-wrapper">
    <div class="bar" [ngClass]="levelClass" [style.width.%]="percent"></div>
  </div>

  <span *ngIf="password" class="strength-text">{{ label }}</span>
</div>
